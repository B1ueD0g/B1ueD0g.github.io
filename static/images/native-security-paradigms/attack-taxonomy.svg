<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Attack taxonomy under NbSP OVTP ARCP</title>
  <desc id="desc">A conceptual table classifying attacks by bypass, reachability and audit visibility.</desc>
  <rect width="1280" height="720" fill="#f8fafc"/>
  <text x="70" y="74" font-family="Arial, 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="34" font-weight="700" fill="#142235">从“攻击类型”到“范式责任”的映射</text>
  <text x="70" y="112" font-family="Arial, 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" fill="#536171">分类不是为了贴标签，而是为了明确防守方应该先修门、补证据，还是改经济账。</text>

  <g font-family="Arial, 'PingFang SC', 'Noto Sans CJK SC', sans-serif">
    <rect x="70" y="160" width="1140" height="92" rx="14" fill="#172434"/>
    <text x="104" y="214" font-size="24" font-weight="700" fill="#fff">判定维度</text>
    <text x="306" y="194" font-size="18" fill="#dbe8f2">B(g)：是否绕过控制点</text>
    <text x="306" y="226" font-size="18" fill="#dbe8f2">R(g)：绕过后触达域有多大</text>
    <text x="680" y="194" font-size="18" fill="#dbe8f2">A(g)：审计是否仍有效</text>
    <text x="680" y="226" font-size="18" fill="#dbe8f2">U(s)：攻击是否仍有利可图</text>

    <rect x="70" y="290" width="210" height="270" rx="14" fill="#fff0ef" stroke="#c94f46" stroke-width="2"/>
    <text x="104" y="332" font-size="26" font-weight="700" fill="#a5332d">B3</text>
    <text x="104" y="370" font-size="18" fill="#633b37">完全绕过</text>
    <text x="104" y="406" font-size="16" fill="#633b37">控制点失效，</text>
    <text x="104" y="432" font-size="16" fill="#633b37">目标域大范围可控。</text>
    <text x="104" y="488" font-size="16" font-weight="700" fill="#a5332d">主责：NbSP</text>
    <text x="104" y="520" font-size="15" fill="#633b37">先消除绕过路径。</text>

    <rect x="300" y="290" width="210" height="270" rx="14" fill="#fff6e8" stroke="#d58a37" stroke-width="2"/>
    <text x="334" y="332" font-size="26" font-weight="700" fill="#8b4f12">B2+</text>
    <text x="334" y="370" font-size="18" fill="#66503a">部分绕过且失明</text>
    <text x="334" y="406" font-size="16" fill="#66503a">触达域有限，</text>
    <text x="334" y="432" font-size="16" fill="#66503a">但可逃逸审计。</text>
    <text x="334" y="488" font-size="16" font-weight="700" fill="#8b4f12">主责：NbSP + OVTP</text>
    <text x="334" y="520" font-size="15" fill="#66503a">修边界，也要补证据。</text>

    <rect x="530" y="290" width="210" height="270" rx="14" fill="#edf4ff" stroke="#3d72ad" stroke-width="2"/>
    <text x="564" y="332" font-size="26" font-weight="700" fill="#245b91">B2-</text>
    <text x="564" y="370" font-size="18" fill="#385c7c">部分绕过但可见</text>
    <text x="564" y="406" font-size="16" fill="#385c7c">边界被突破，</text>
    <text x="564" y="432" font-size="16" fill="#385c7c">响应窗口仍存在。</text>
    <text x="564" y="488" font-size="16" font-weight="700" fill="#245b91">主责：检测与应急</text>
    <text x="564" y="520" font-size="15" fill="#385c7c">压缩攻击窗口。</text>

    <rect x="760" y="290" width="210" height="270" rx="14" fill="#eaf8f5" stroke="#2b8a72" stroke-width="2"/>
    <text x="794" y="332" font-size="26" font-weight="700" fill="#176854">B1</text>
    <text x="794" y="370" font-size="18" fill="#3d6259">合法接口滥用</text>
    <text x="794" y="406" font-size="16" fill="#3d6259">门未被绕过，</text>
    <text x="794" y="432" font-size="16" fill="#3d6259">任务与身份失真。</text>
    <text x="794" y="488" font-size="16" font-weight="700" fill="#176854">主责：OVTP</text>
    <text x="794" y="520" font-size="15" fill="#3d6259">让合法请求可判责。</text>

    <rect x="990" y="290" width="220" height="270" rx="14" fill="#f5f0ff" stroke="#8063b0" stroke-width="2"/>
    <text x="1024" y="332" font-size="26" font-weight="700" fill="#5e4491">B0</text>
    <text x="1024" y="370" font-size="18" fill="#574a71">资源阻塞</text>
    <text x="1024" y="406" font-size="16" fill="#574a71">未越权，</text>
    <text x="1024" y="432" font-size="16" fill="#574a71">但消耗服务能力。</text>
    <text x="1024" y="488" font-size="16" font-weight="700" fill="#5e4491">主责：ARCP</text>
    <text x="1024" y="520" font-size="15" fill="#574a71">改写攻防成本比。</text>
  </g>

  <rect x="70" y="608" width="1140" height="54" rx="14" fill="#172434"/>
  <text x="102" y="642" font-family="Arial, 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="18" fill="#ffffff">实务判断：B3/B2+ 是底线风险，B1 是治理风险，B0 是经济风险；三者需要不同的工程抓手。</text>
</svg>
