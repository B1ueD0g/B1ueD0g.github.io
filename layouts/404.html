{{- define "main" }}
{{- $homePath := "" | absLangURL -}}
{{- $postsPath := "posts/" | absLangURL -}}
{{- $searchPath := "search/" | absLangURL -}}
<section class="not-found-wrap">
  <article class="not-found-card">
    <p class="not-found-code">404 / Lost Signal</p>
    <h1 class="not-found-title">Page Not Found</h1>
    <p class="not-found-text">这个页面不存在或地址已变更，你可以返回首页或继续搜索。</p>
    <p class="not-found-hint">Try home, archive, or search by topic.</p>

    <div class="not-found-actions">
      <a href="{{ $homePath }}">Home</a>
      <a href="{{ $postsPath }}">Article</a>
      <a href="{{ $searchPath }}">Search</a>
    </div>

    <form id="not-found-search-form" class="not-found-search" action="{{ $searchPath }}" method="get">
      <input id="not-found-keyword" type="search" name="q" placeholder="输入关键词继续搜索" aria-label="Search posts">
      <button type="submit">Search</button>
    </form>
  </article>
</section>

<script>
  window.addEventListener("DOMContentLoaded", function () {
    var searchPath = {{ $searchPath | jsonify | safeJS }};
    var form = document.getElementById("not-found-search-form");
    var input = document.getElementById("not-found-keyword");
    if (form && input) {
      form.addEventListener("submit", function (event) {
        var keyword = input.value.trim();
        if (!keyword) {
          event.preventDefault();
          window.location.href = searchPath;
          return;
        }
        if (typeof window.BlueDogTrack === "function") {
          window.BlueDogTrack("search_submit_404", { query: keyword });
        }
      });
    }

    try {
      if (typeof window.BlueDogTrack === "function") {
        window.BlueDogTrack("404", { path: window.location.pathname });
      } else {
        if (typeof window.plausible === "function") {
          window.plausible("404", { props: { path: window.location.pathname } });
        }
        if (window.umami && typeof window.umami.track === "function") {
          window.umami.track("404");
        }
      }
    } catch (error) {
      console.warn("analytics track failed on 404 page", error);
    }
  });
</script>
{{- end }}
