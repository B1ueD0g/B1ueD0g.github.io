<footer class="custom-min-footer">
  <p>{{ site.Params.footer.text | default "Progress, Not Perfection" }}</p>
</footer>

<div id="copy-toast" class="copy-toast" role="status" aria-live="polite" aria-atomic="true"></div>
{{- $siteEnhance := resources.Get "js/site-enhance.js" | minify | fingerprint -}}

<script>
  (function () {
    var ua = navigator.userAgent || "";
    var isWeChatWebView = /MicroMessenger/i.test(ua);

    window.BlueDogEnv = window.BlueDogEnv || {};
    window.BlueDogEnv.isWeChatWebView = isWeChatWebView;
    window.BlueDogEnv.homePath = {{ "" | absLangURL | jsonify | safeJS }};
    window.BlueDogEnv.searchPath = {{ "search/" | absLangURL | jsonify | safeJS }};
    window.BlueDogEnv.postsPath = {{ "posts/" | absLangURL | jsonify | safeJS }};

    if (isWeChatWebView) {
      document.documentElement.classList.add("wechat-safe");
      if (document.body) document.body.classList.add("wechat-safe");
      return;
    }

    var script = document.createElement("script");
    script.src = "{{ $siteEnhance.RelPermalink }}";
    script.defer = true;
    document.body.appendChild(script);
  })();
</script>
